<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}新生管理系统{% endblock %}</title>
    <style>
        :root { --primary: #4f6ef7; --bg: #f5f6fa; --white: #fff; --text: #2d3348; --light-text: #6b7280; --border: #e5e7ed; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); min-height:100vh; }
        nav { background:var(--white); box-shadow:0 2px 15px rgba(0,0,0,0.04); padding:12px 28px; display:flex; align-items:center; justify-content:space-between; }
        nav .logo { font-weight:700; font-size:1.2rem; color:var(--primary); }
        nav .menu a { margin-left:20px; text-decoration:none; color:var(--text); font-weight:500; font-size:0.95rem; transition:color 0.2s; }
        nav .menu a:hover { color:var(--primary); }
        .container { max-width:1100px; margin:30px auto; background:var(--white); border-radius:12px; padding:28px 32px; box-shadow:0 4px 20px rgba(0,0,0,0.04); }
        .flash-msg { padding:12px 16px; border-radius:8px; margin-bottom:18px; display:flex; align-items:center; gap:8px; font-size:0.9rem; }
        .flash-msg.success { background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; }
        .flash-msg.error { background:#fef2f2; color:#991b1b; border:1px solid #fecaca; }
        .btn { display:inline-block; padding:10px 20px; border-radius:8px; text-decoration:none; font-weight:600; font-size:0.9rem; cursor:pointer; border:none; transition:transform 0.2s,box-shadow 0.2s; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-primary:hover { background:#3b54d4; }
        .btn-danger { background:#ef4444; color:#fff; }
        .btn-danger:hover { background:#dc2626; }
        .btn-secondary { background:#f0f0f5; color:#333; }
        .btn-sm { padding:6px 14px; font-size:0.8rem; }
        table { width:100%; border-collapse:collapse; margin-top:16px; }
        th, td { padding:12px 10px; border-bottom:1px solid var(--border); text-align:left; font-size:0.9rem; }
        th { background:#f9fafb; font-weight:600; }
        .text-center { text-align:center; }
        .pagination { display:flex; justify-content:center; margin-top:20px; gap:8px; }
        .pagination a, .pagination span { padding:6px 14px; border:1px solid #ddd; border-radius:6px; text-decoration:none; color:var(--text); font-size:0.85rem; }
        .pagination .current { background:var(--primary); color:#fff; border-color:var(--primary); }
    </style>
</head>
<body>
    <nav>
        <div class="logo">🎓 新生管理系统</div>
        <div class="menu">
            <a href="{{ url_for('dashboard') }}">仪表盘</a>
            <a href="{{ url_for('student_list') }}">新生管理</a>
            <a href="{{ url_for('logout') }}">退出 ({{ session.username }})</a>
        </div>
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash-msg {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
